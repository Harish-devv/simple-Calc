<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styled.css">
    <title>SimpleCalc</title>
</head>
<body>
    <div class="container">
        <div class="screen">
            <span id="display">
                0
            </span>
            <hr>
        </div>
        <div class="buttons">
            <div class="calc-row">
                <button class="operators" id="clearAll">AC</button>
                <button class="operators">/</button>
                <button class="operators">X</button>
                <button class="operators" id="backspace">&larr;</button><br>
            </div>

            <div class="calc-row">
                <button class="numbers">7</button>
                <button class="numbers">8</button>
                <button class="numbers">9</button>
                <button class="operators">-</button><br>
            </div>

            <div class="calc-row">
                <button class="numbers">4</button>
                <button class="numbers">5</button>
                <button class="numbers">6</button>
                <button class="operators">+</button><br>
            </div>

            <div class="calc-row">
                <button class="numbers">1</button>
                <button class="numbers">2</button>
                <button class="numbers">3</button>
                <button id="equals" class="operators">=</button>
                <br>
            </div>

            <div class="calc-row-triple">
                <button id="percent" class="operators">%</button>
                <button class="numbers">0</button>
                <button id="point" class="numbers">.</button>
            </div>
        </div>
    </div>
    <script src="simpleCalc.js"></script>
</body>
</html>
